const YEARS = DATA.years;
function color(v){return v==null?'#f0f0f0':v>8?'#800026':v>7?'#bd0026':v>6?'#e31a1c':
  v>5?'#fc4e2a':v>4?'#fd8d3c':v>3?'#feb24c':v>2?'#fed976':v>0?'#ffeda0':'#f0f0f0';}
function fmt(n){return n==null?'keine Daten':n.toLocaleString('de-CH').replace(/,/g,String.fromCharCode(8217))+' CHF';}

const map=L.map('map',{zoomControl:false,attributionControl:false,worldCopyJump:false,
  minZoom:1,maxZoom:6}).setView([25,10],1.6);
L.control.zoom({position:'bottomleft'}).addTo(map);  // +/- nach unten links, damit das Dropdown frei bleibt
map.setMaxBounds([[-75,-200],[88,210]]);

// Regionen-Zoom (fitBounds: [[Süd,West],[Nord,Ost]])
const REGIONS={welt:[[-58,-170],[80,190]],europa:[[34,-25],[72,45]],
  levante:[[12,32],[40,60]],afrika:[[-35,-18],[37,52]],
  nordamerika:[[13,-128],[60,-60]],suedamerika:[[-54,-80],[12,-36]],
  asien:[[5,40],[58,150]],ozeanien:[[-48,110],[3,180]]};
document.getElementById('region').onchange=function(e){var b=REGIONS[e.target.value]; if(b) map.fitBounds(b);};

const NB=String.fromCharCode(8217);
const bins=[['>= 100 Mio.',8.2],['10 Mio.',7],['1 Mio.',6],['100'+NB+'000',5],['10'+NB+'000',4],['< 10'+NB+'000',1]];
document.getElementById('legend').innerHTML='<b>Exportwert (CHF)</b>'+
  bins.map(b=>'<i style="background:'+color(b[1])+'"></i>'+b[0]).join('<br>')+
  '<br><i style="background:#f0f0f0"></i>keine Daten';

let layer=null, idx=YEARS.length-1, geo=null;
const slider=document.getElementById('slider'), ylabel=document.getElementById('ylabel');
slider.max=YEARS.length-1; slider.value=idx;

function iso(p){let c=p.ISO_A3_EH; if(!c||c=='-99')c=p.ADM0_A3||p.ISO_A3; return c;}
function styleFor(f){const y=YEARS[idx];const v=DATA.log[y]?DATA.log[y][iso(f.properties)]:null;
  return {fillColor:color(v),weight:.5,color:'#fff',fillOpacity:.92};}
function tip(f){const y=YEARS[idx];const p=f.properties;const c=iso(p);
  const raw=DATA.val[y]?DATA.val[y][c]:null;const nm=p.NAME_DE||p.NAME||p.ADMIN||c;
  let s='<b>'+nm+'</b> ('+y+')<br>Total: '+fmt(raw);
  const cats=DATA.cat[y]?DATA.cat[y][c]:null;
  if(cats&&cats.length){s+='<br><i>Wichtigste Kategorien:</i>';
    cats.forEach(function(x){s+='<br>&nbsp;&nbsp;'+x[0]+': '+fmt(x[1]);});}
  return s;}

function redraw(){ if(!geo)return; ylabel.textContent=YEARS[idx];
  if(layer){layer.setStyle(styleFor); layer.eachLayer(l=>l.setTooltipContent(tip(l.feature)));}}
slider.addEventListener('input',function(){idx=+slider.value; redraw();});

let timer=null;const playBtn=document.getElementById('play');
playBtn.onclick=function(){ if(timer){clearInterval(timer);timer=null;playBtn.innerHTML='&#9654; Abspielen';return;}
  playBtn.innerHTML='&#9208; Pause';
  timer=setInterval(function(){idx=(idx+1)%YEARS.length;slider.value=idx;redraw();},900);};

fetch('https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_admin_0_countries.geojson')
 .then(r=>r.json()).then(function(gj){geo=gj;
   layer=L.geoJSON(gj,{style:styleFor,onEachFeature:function(f,l){

     l.on('mouseover',function(){l.setStyle({weight:1.5,color:'#333'});});
     l.on('mouseout',function(){l.setStyle({weight:.5,color:'#fff'});});
   }}).addTo(map);
   redraw();
 }).catch(function(e){document.getElementById('legend').innerHTML+='<br><span style="color:red">Karte konnte nicht geladen werden</span>';});
